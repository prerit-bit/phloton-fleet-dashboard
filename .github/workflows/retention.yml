name: Nightly Retention (Drive archive + hourly aggregate)

on:
  # Once a day at 02:30 UTC (~08:00 IST). GitHub schedules can lag — that's
  # fine; idempotent so re-runs are safe.
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch: {}

concurrency:
  group: phloton-retention
  cancel-in-progress: false

jobs:
  retention:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run retention
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GDRIVE_SA_JSON: ${{ secrets.GDRIVE_SA_JSON }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
