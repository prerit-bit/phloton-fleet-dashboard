name: Anedya → Supabase Sync

on:
  schedule:
    # Every 5 minutes. Repo is public so Actions minutes are free/unlimited.
    # Sync is parallelized (~1 min/run) + idempotent (cursor-based) and the
    # concurrency lock below prevents overlap, so a tight cadence is safe.
    # GitHub's own cron is unreliable — the cron-job.org trigger (also set
    # to 5 min) is the dependable one; this is the backup.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

# Never run two syncs at once (they share Supabase sync_state cursors).
concurrency:
  group: phloton-anedya-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 22+ ships a native global WebSocket, which
          # @supabase/supabase-js requires (Node 20 throws without it).
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run sync
        env:
          NEXT_PUBLIC_ANEDYA_API_KEY: ${{ secrets.NEXT_PUBLIC_ANEDYA_API_KEY }}
          NEXT_PUBLIC_NODES_ID: ${{ secrets.NEXT_PUBLIC_NODES_ID }}
          NEXT_PUBLIC_VARIABLES_IDENTIFIER: ${{ secrets.NEXT_PUBLIC_VARIABLES_IDENTIFIER }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPS_TELEGRAM_CHAT_ID: ${{ secrets.OPS_TELEGRAM_CHAT_ID }}
