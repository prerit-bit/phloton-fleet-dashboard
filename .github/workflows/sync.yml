name: Anedya → Supabase Sync

on:
  schedule:
    # Every 30 minutes. A full incremental run takes ~17 min (29 units ×
    # ~17 vars, sequential Anedya calls), so 30 min leaves headroom and
    # avoids overlapping/backlogged runs. No data is lost between runs —
    # the sync is incremental from a stored cursor; only the dashboard's
    # "latest" value lags by up to ~30 min.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

# Never run two syncs at once (they share Supabase sync_state cursors).
concurrency:
  group: phloton-anedya-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # Node 22+ ships a native global WebSocket, which
          # @supabase/supabase-js requires (Node 20 throws without it).
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run sync
        env:
          NEXT_PUBLIC_ANEDYA_API_KEY: ${{ secrets.NEXT_PUBLIC_ANEDYA_API_KEY }}
          NEXT_PUBLIC_NODES_ID: ${{ secrets.NEXT_PUBLIC_NODES_ID }}
          NEXT_PUBLIC_VARIABLES_IDENTIFIER: ${{ secrets.NEXT_PUBLIC_VARIABLES_IDENTIFIER }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
