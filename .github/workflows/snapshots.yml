name: Fast Snapshot Sync

on:
  schedule:
    # GitHub's own cron can't go below 5 min — this is just a backup.
    # The real 1-minute cadence comes from a cron-job.org trigger hitting
    # this workflow's dispatch endpoint.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

# Shared lock with the full sync (sync.yml) — never run both at once.
concurrency:
  group: phloton-sync
  cancel-in-progress: false

jobs:
  snapshots:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run sync:snapshots
        env:
          NEXT_PUBLIC_ANEDYA_API_KEY: ${{ secrets.NEXT_PUBLIC_ANEDYA_API_KEY }}
          NEXT_PUBLIC_NODES_ID: ${{ secrets.NEXT_PUBLIC_NODES_ID }}
          NEXT_PUBLIC_VARIABLES_IDENTIFIER: ${{ secrets.NEXT_PUBLIC_VARIABLES_IDENTIFIER }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          OPS_TELEGRAM_CHAT_ID: ${{ secrets.OPS_TELEGRAM_CHAT_ID }}
